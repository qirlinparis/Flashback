# Flashback nginx config
# Place at: /etc/nginx/conf.d/flashback.conf
# After SSL cert is obtained, certbot will update this file automatically.
# For now this sets up HTTP (port 80) to prove domain ownership to certbot.

server {
    listen 80;
    server_name qirlinparis.code;

    location / {
        proxy_pass http://127.0.0.1:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
